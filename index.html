<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-tracker">
    <h1>Math Dice Game</h1>

    <p>Target Number: <span id="target">20</span></p>
    <p>Current Total: <span id="total">0</span></p>
    <p>Games Played: <span id="games">0</span></p>

    <div id="dice">&#x1F3B2</div>

    <p id="message">Click the dice to play!</p>
    <button id="resetBtn">New Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
